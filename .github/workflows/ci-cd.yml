name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # 1. 단위 + 통합 테스트를 한 번에 실행 (PR/push 공통 게이트)
  check:
    name: Test (unit + integration)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build local DB Docker image for Testcontainers
        run: docker build -t enjoytrip-postgis-pgvector:17-3.5 ./infra/postgres-vector

      - name: Run all tests
        run: ./gradlew test integrationTest

  build:
    name: Build BootJar
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build bootJar
        run: ./gradlew :core:core-api:bootJar -x test

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-api-jar
          path: core/core-api/build/libs/core-api-*.jar
          retention-days: 1

  # 3. CD 배포 단계 (통합 테스트와 빌드가 모두 성공했을 때 실행)
  deploy:
    name: Deploy to EC2
    needs: [check, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # build job에서 생성한 jar 파일 다운로드
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: core-api-jar
          path: core/core-api/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push API Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: core/core-api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/enjoytrip-api:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/enjoytrip-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push DB Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/postgres-vector/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/enjoytrip-postgis-pgvector:17-3.5
            ${{ secrets.DOCKERHUB_USERNAME }}/enjoytrip-postgis-pgvector:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # docker-compose.prod.yml 및 infra 디렉토리를 원격 서버로 복사
      - name: Copy Docker Compose and Infra files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DOMAIN_NAME }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml,infra"
          target: "/home/${{ secrets.EC2_USER }}/deploy-temp"
          strip_components: 0

      # SSH를 통해 서버에 접속하여 배포 수행
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DOMAIN_NAME }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            # 1. 배포 경로 디렉토리 생성 및 소유권 보장
            sudo mkdir -p /home/${{ secrets.EC2_USER }}/enjoytrip
            sudo chown -R ${{ secrets.EC2_USER }}:${{ secrets.EC2_USER }} /home/${{ secrets.EC2_USER }}/enjoytrip
            
            # 2. 임시 폴더에서 배포 폴더로 복사 및 임시 폴더 삭제
            cp -r /home/${{ secrets.EC2_USER }}/deploy-temp/* /home/${{ secrets.EC2_USER }}/enjoytrip/
            rm -rf /home/${{ secrets.EC2_USER }}/deploy-temp
            
            cd /home/${{ secrets.EC2_USER }}/enjoytrip
            
            # .env 파일 생성
            cat << 'EOF' > .env
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_URL=${{ secrets.DB_URL }}
            AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            ENJOYTRIP_OAUTH2_REDIRECT_URI=${{ secrets.ENJOYTRIP_OAUTH2_REDIRECT_URI }}
            GMS_KEY=${{ secrets.GMS_KEY }}
            KMA_API_KEY=${{ secrets.KMA_API_KEY }}
            DOMAIN_NAME=${{ secrets.DOMAIN_NAME }}
            ACME_EMAIL=${{ secrets.ACME_EMAIL }}
            API_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/enjoytrip-api:${{ github.sha }}
            DB_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/enjoytrip-postgis-pgvector:17-3.5
            EOF
            
            # Docker Hub 로그인
            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
            
            # docker-compose 버전 확인 후 pull 및 컨테이너 갱신 실행
            if docker compose version >/dev/null 2>&1; then
              docker compose -f docker-compose.prod.yml pull api db
              docker compose -f docker-compose.prod.yml up -d
            else
              docker-compose -f docker-compose.prod.yml pull api db
              docker-compose -f docker-compose.prod.yml up -d
            fi
            
            # 미사용 Docker 이미지 및 컨테이너 정리
            docker image prune -f
            
            # 배포 후 컨테이너 상태 출력 디버깅
            echo "=== 컨테이너 상태 ==="
            if docker compose version >/dev/null 2>&1; then
              docker compose -f docker-compose.prod.yml ps -a
            else
              docker-compose -f docker-compose.prod.yml ps -a
            fi
