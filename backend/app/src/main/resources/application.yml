server:
  port: ${PORT:8080}

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../../.env[.properties]
  application:
    name: enjoytrip-backend
  datasource:
    url: ${ENJOYTRIP_DB_URL:jdbc:postgresql://localhost:5432/enjoytrip}
    username: ${ENJOYTRIP_DB_USER:ssafy}
    password: ${ENJOYTRIP_DB_PASSWORD:ssafy}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    baseline-on-migrate: true
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

enjoytrip:
  external:
    tour-api:
      service-key: ${ENJOYTRIP_TOUR_API_KEY:${TOUR_API_KEY:}}
    ev-charger:
      api-key: ${DATA_PORTAL_API_KEY:${EV_CHARGER_API_KEY:${ENJOYTRIP_EV_API_KEY:${TOUR_API_KEY:}}}}
    open-weather-map:
      api-key: ${OPENWEATHERMAP_API_KEY:${OPENWEATHER_API_KEY:}}
  jwt:
    secret: ${ENJOYTRIP_JWT_SECRET:dev-only-enjoytrip-jwt-secret-change-me-please-32b}
    expiration-seconds: ${ENJOYTRIP_JWT_EXPIRATION_SECONDS:7200}
  oauth2:
    authorized-redirect-uri: ${ENJOYTRIP_OAUTH2_REDIRECT_URI:http://localhost:5173/oauth/callback}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
  ai:
    redis:
      stream-key: ${AI_RESPONSE_STREAM_KEY:enjoytrip-ai-responses}
      reader-name: ${AI_RESPONSE_STREAM_READER:${HOSTNAME:enjoytrip-backend}}
      poll:
        block-timeout-millis: ${AI_RESPONSE_STREAM_BLOCK_TIMEOUT_MILLIS:2000}
        retry-delay-millis: ${AI_RESPONSE_STREAM_RETRY_DELAY_MILLIS:1000}
        batch-size: ${AI_RESPONSE_STREAM_BATCH_SIZE:10}
    sse:
      timeout-millis: ${AI_SSE_TIMEOUT_MILLIS:180000}
      delivery-threads: ${AI_SSE_DELIVERY_THREADS:2}
      delivery-queue-capacity: ${AI_SSE_DELIVERY_QUEUE_CAPACITY:100}
