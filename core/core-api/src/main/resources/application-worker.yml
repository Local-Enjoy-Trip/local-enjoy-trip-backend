spring:
  main:
    web-application-type: none
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../../.env[.properties]
      - classpath:application-storage.yml
  application:
    name: enjoytrip-worker
  datasource:
    url: ${ENJOYTRIP_DB_URL:jdbc:postgresql://localhost:5432/enjoytrip}
    username: ${ENJOYTRIP_DB_USER:ssafy}
    password: ${ENJOYTRIP_DB_PASSWORD:ssafy}
    driver-class-name: org.postgresql.Driver
  flyway:
    baseline-on-migrate: true
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

enjoytrip:
  attraction:
    popularity:
      flush-delay-ms: ${ATTRACTION_POPULARITY_FLUSH_DELAY_MS:1000}
      flush-batch-size: ${ATTRACTION_POPULARITY_FLUSH_BATCH_SIZE:500}
      reconcile-initial-delay-ms: ${ATTRACTION_POPULARITY_RECONCILE_INITIAL_DELAY_MS:10000}
      reconcile-delay-ms: ${ATTRACTION_POPULARITY_RECONCILE_DELAY_MS:3600000}
