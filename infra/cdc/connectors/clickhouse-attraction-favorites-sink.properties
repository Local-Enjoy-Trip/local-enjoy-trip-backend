name=attraction-favorites-clickhouse-sink
connector.class=com.clickhouse.kafka.connect.ClickHouseSinkConnector
tasks.max=1

topics=enjoytrip.public.attraction_favorites
topic2TableMap=enjoytrip.public.attraction_favorites=attraction_favorites_events
hostname=clickhouse
port=8123
ssl=false
database=default
username=default
password=enjoytrip_clickhouse
exactlyOnce=false
errors.tolerance=none
errors.retry.timeout=60

key.converter=org.apache.kafka.connect.json.JsonConverter
key.converter.schemas.enable=false
value.converter=org.apache.kafka.connect.json.JsonConverter
value.converter.schemas.enable=false

# The ClickHouse sink receives flattened CDC records. These sink-side SMTs only add
# Kafka audit coordinates and rename Debezium metadata fields into ClickHouse columns.
transforms=insertKafkaMetadata,renameFields
transforms.insertKafkaMetadata.type=org.apache.kafka.connect.transforms.InsertField$Value
transforms.insertKafkaMetadata.topic.field=kafka_topic
transforms.insertKafkaMetadata.partition.field=kafka_partition
transforms.insertKafkaMetadata.offset.field=kafka_offset
transforms.renameFields.type=org.apache.kafka.connect.transforms.ReplaceField$Value
transforms.renameFields.renames=__op:source_op,__lsn:source_lsn,__source_ts_ms:source_ts_ms,__source_txId:tx_id,__source_snapshot:snapshot_flag,__table:source_table,__deleted:is_deleted

# Bounded fetch-based local micro-batching. max.poll.records is a cap, not the wait policy.
consumer.override.max.poll.records=500
consumer.override.fetch.max.wait.ms=1000
consumer.override.fetch.min.bytes=1
consumer.override.fetch.max.bytes=5242880
consumer.override.max.partition.fetch.bytes=1048576

clickhouseSettings=input_format_skip_unknown_fields=1,input_format_defaults_for_omitted_fields=1,input_format_null_as_default=1,async_insert=1,wait_for_async_insert=1
